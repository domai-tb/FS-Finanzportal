# FS-Finanzportal – Docker Compose Stack
#
# Services:
#   wordpress  – Apache/PHP WordPress
#   mariadb    – WordPress database
#   keycloak   – SSO / OpenID Connect (with dev mode)
#   postgres   – Keycloak database
#   wp-cli     – one-shot container for automated WP setup
#
# Usage:
#   cp .env.example .env
#   ./scripts/setup.sh

services:

  # ─── MariaDB (WordPress) ───────────────────────────────────
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── WordPress ────────────────────────────────────────────
  wordpress:
    image: wordpress:6-apache
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "${WP_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
    volumes:
      - wp_data:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/wp-login.php"]
      interval: 15s
      timeout: 5s
      retries: 12

  # ─── WP-CLI (one-shot setup) ──────────────────────────────
  wp-cli:
    image: wordpress:cli
    # wordpress:cli is Alpine-based (www-data uid 82) while wordpress:6-apache
    # is Debian-based (www-data uid 33). Running as uid/gid 33 ensures wp-cli
    # can write to the volume that was populated by the Apache container.
    user: "33:33"
    depends_on:
      wordpress:
        condition: service_healthy
    volumes:
      - wp_data:/var/www/html
      - ./scripts/wp-install.sh:/scripts/wp-install.sh:ro
      - ./scripts/configure-wordpress.sh:/scripts/configure-wordpress.sh:ro
      - ./scripts/wp-eval:/scripts/wp-eval:ro
      - ./wordpress/config:/wordpress/config:ro
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WP_URL: ${WP_URL}
      WP_TITLE: ${WP_TITLE}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
      HOME: /tmp
      WP_CLI_CACHE_DIR: /tmp/wp-cli-cache
      WP_CONFIG_DIR: /wordpress/config
      KC_REALM: ${KC_REALM:-fs-finance}
      KC_WORDPRESS_CLIENT_ID: ${KC_WORDPRESS_CLIENT_ID:-wordpress}
      KC_WORDPRESS_CLIENT_SECRET: ${KC_WORDPRESS_CLIENT_SECRET}
      KC_EXTERNAL_URL: http://localhost:${KC_PORT:-8180}
      KC_INTERNAL_URL: http://keycloak:8080
    entrypoint: ["sh", "/scripts/wp-install.sh"]
    profiles:
      - setup   # only run with: docker compose --profile setup up wp-cli

  # ─── PostgreSQL (Keycloak) ────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Keycloak ─────────────────────────────────────────────
  keycloak:
    # Official Keycloak container image:
    # https://www.keycloak.org/server/containers
    image: quay.io/keycloak/keycloak:26.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${KC_PORT:-8180}:8080"
    environment:
      KC_DB: ${KC_DB}
      KC_DB_URL: ${KC_DB_URL}
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_REALM: ${KC_REALM:-fs-finance}
      KC_WORDPRESS_CLIENT_ID: ${KC_WORDPRESS_CLIENT_ID:-wordpress}
      KC_WORDPRESS_CLIENT_SECRET: ${KC_WORDPRESS_CLIENT_SECRET}
      WP_URL: ${WP_URL}
    volumes:
      # Import realm on first start
      - ./keycloak/realms:/opt/keycloak/data/import:ro
    command: ["start-dev", "--import-realm"]
    healthcheck:
      # The official Keycloak image does not include curl. Check that the
      # HTTP listener is accepting connections without adding a custom image.
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/localhost/8080'"]
      interval: 20s
      timeout: 10s
      retries: 15

volumes:
  mariadb_data:
  wp_data:
  postgres_data:
